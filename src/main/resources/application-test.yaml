spring:
  datasource:
    url: jdbc:h2:mem:delivery;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-init-sql:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

telegram:
  enabled: false

yandex:
  geocoder:
    enabled: false
  delivery:
    enabled: false

virtual-try-on:
  fashn:
    api-key: test-api-key
    webhook-base-url: http://localhost:8080
    webhook-secret: test-webhook-secret
