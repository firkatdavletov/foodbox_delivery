spring.application.name=delivery

spring.security.user.password=test
jwt.secret=${JWT_SECRET_BASE64}

spring.datasource.url=jdbc:postgresql://localhost:5433/foodbox_db
spring.datasource.username=${DATASOURCE_LOGIN}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=TRACE

spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=false

image.upload-dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

yandex.map.api.key=${YANDEX_MAP_API_KEY}
yandex.map.baseurl=https://geocode-maps.yandex.ru/v1