spring.application.name=delivery

spring.security.user.password=test
jwt.secret=${JWT_SECRET_BASE64}

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_LOGIN}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=false

image.upload-dir=${IMAGES_DIR}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

yandex.map.api.key=${YANDEX_MAP_API_KEY}
yandex.map.baseurl=https://geocode-maps.yandex.ru/v1

sms.ru.api.key = ${SMS_RU_API}

cloud.payments.public.id = ${CLOUDPAYMENTS_PUBLIC_ID}
cloud.payments.secret = ${CLOUDPAYMENTS_SECRET}

server.port=${SERVER_PORT}