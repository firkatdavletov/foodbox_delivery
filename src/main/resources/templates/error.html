<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Ошибка загрузки</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #fef2f2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }
    .container {
        background-color: #ffffff;
        padding: 30px 40px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: center;
    }
    .error {
        color: #f44336;
        font-size: 24px;
        margin-bottom: 20px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 4px;
        background-color: #f44336;
        color: #fff;
        cursor: pointer;
    }
    button:hover {
        background-color: #d32f2f;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="error">Произошла ошибка при загрузке файла.</div>
  <form action="/admin/upload" method="get">
    <button type="submit">Попробовать снова</button>
  </form>
</div>
</body>
</html>
