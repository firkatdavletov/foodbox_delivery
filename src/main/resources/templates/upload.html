<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Загрузка каталога</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-color: #f2f2f7;
      --card-bg: #ffffff;
      --primary: #007aff;
      --primary-pressed: #005ecb;
      --text-primary: #1c1c1e;
      --text-secondary: #6e6e73;
      --border-color: #d1d1d6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                   "Helvetica Neue", Arial, sans-serif;
      color: var(--text-primary);
    }

    .card {
      background: var(--card-bg);
      padding: 32px;
      width: 100%;
      max-width: 400px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h2 {
      margin: 0 0 24px 0;
      font-weight: 600;
      font-size: 20px;
    }

    .file-input-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background-color: #fafafa;
      font-size: 14px;
      cursor: pointer;
    }

    input[type="file"]::file-selector-button {
      border: none;
      background: var(--primary);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      margin-right: 12px;
      cursor: pointer;
      font-weight: 500;
    }

    input[type="file"]::file-selector-button:hover {
      background: var(--primary-pressed);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 14px;
      background-color: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.05s ease;
    }

    button:hover {
      background-color: var(--primary-pressed);
    }

    button:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Загрузить каталог (.csv)</h2>

  <form method="POST" enctype="multipart/form-data" action="/admin/catalog/upload">
    <div class="file-input-wrapper">
      <input type="file" name="file" accept=".csv" required />
    </div>

    <button type="submit">Загрузить</button>
  </form>

  <div class="hint">
    Поддерживается формат CSV
  </div>
</div>

</body>
</html>
