    CreateVirtualTryOnSessionRequest:
      type: object
      required: [productId, modelImage]
      properties:
        productId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
          nullable: true
        modelImage:
          type: string
          minLength: 1
          description: Public image URL or base64 data URI accepted by FASHN as `model_image`.
        category:
          $ref: '#/components/schemas/VirtualTryOnCategory'
        garmentPhotoType:
          $ref: '#/components/schemas/VirtualTryOnGarmentPhotoType'
        mode:
          $ref: '#/components/schemas/VirtualTryOnMode'
        moderationLevel:
          $ref: '#/components/schemas/VirtualTryOnModerationLevel'
        segmentationFree:
          type: boolean
          default: true
        seed:
          type: integer
          format: int64
          minimum: 0
          maximum: 4294967295
          nullable: true
        numSamples:
          type: integer
          format: int32
          minimum: 1
          maximum: 4
          nullable: true
        outputFormat:
          $ref: '#/components/schemas/VirtualTryOnOutputFormat'

    VirtualTryOnSessionResponse:
      type: object
      required:
        [
          id,
          productId,
          garmentImageUrl,
          status,
          outputImages,
          websocketEndpoint,
          websocketDestination,
          createdAt,
          updatedAt,
        ]
      description: |
        Session snapshot returned by REST endpoints and broadcast to websocket subscribers.
        To receive live updates, connect to `websocketEndpoint` and subscribe to `websocketDestination`.
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
          nullable: true
        garmentImageUrl:
          type: string
        status:
          $ref: '#/components/schemas/VirtualTryOnSessionStatus'
        providerStatus:
          type: string
          nullable: true
          description: Raw provider state returned by FASHN, for example `starting`, `processing`, `completed`, `failed`.
        outputImages:
          type: array
          items:
            type: string
        error:
          $ref: '#/components/schemas/VirtualTryOnSessionErrorResponse'
        websocketEndpoint:
          type: string
          description: STOMP/SockJS websocket endpoint path on this backend.
        websocketDestination:
          type: string
          description: Topic destination to subscribe to for session updates.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    VirtualTryOnSessionErrorResponse:
      type: object
      nullable: true
      properties:
        name:
          type: string
          nullable: true
        message:
          type: string
          nullable: true

    FashnWebhookRequest:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        output:
          type: array
          items:
