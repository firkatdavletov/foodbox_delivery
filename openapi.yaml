openapi: 3.0.3
info:
  title: Delivery Service API
  version: 1.0.0
  description: |
    OpenAPI specification generated from existing Spring Boot controllers and DTOs.
    Includes only routes found in code under `src/main/kotlin`.
tags:
  - name: Auth
    description: Authentication and session management
  - name: Admin Auth
    description: Admin authentication and session management
  - name: Cart
    description: Shopping cart operations
  - name: Catalog
    description: Public product and category catalog
  - name: Catalog Admin
    description: Admin catalog management
  - name: Orders
    description: Order placement and retrieval
  - name: Orders Admin
    description: Admin order operations
  - name: Notifications Admin
    description: Admin notification operations
  - name: Media Admin
    description: Admin media upload session operations
  - name: Virtual Try-On
    description: |
      Client virtual try-on sessions, FASHN webhook integration, and websocket update flow.
      Websocket handshake endpoint: `/ws/virtual-try-on` (STOMP over SockJS).
      Subscription destination is returned per session in `websocketDestination`.
paths:
  /api/v1/auth/methods:
    get:
      tags: [Auth]
      operationId: getAvailableAuthMethods
      summary: List available authentication methods
      responses:
        '200':
          description: Available authentication methods
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableAuthMethodsResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/phone/start:
    post:
      tags: [Auth]
      operationId: startPhoneAuth
      summary: Start phone authentication challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartPhoneAuthRequest'
      responses:
        '200':
          description: Phone auth challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/phone/confirm:
    post:
      tags: [Auth]
      operationId: confirmPhoneAuthCode
      summary: Confirm phone auth challenge with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPhoneCodeRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/virtual-try-on/sessions:
    post:
      tags: [Virtual Try-On]
      operationId: createVirtualTryOnSession
      summary: Start a virtual try-on session
      description: |
        Requires either a bearer token for an authenticated user or `X-Install-Id` for a guest installation.
        The backend resolves the garment image from the active product or variant and submits the request to FASHN.
        The response includes websocket connection details for real-time status updates.
      parameters:
        - in: header
          name: X-Install-Id
          required: false
          schema:
            type: string
          description: Guest installation identifier used when no bearer token is provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVirtualTryOnSessionRequest'
      responses:
        '200':
          description: Virtual try-on session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualTryOnSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/virtual-try-on/sessions/{sessionId}:
    get:
      tags: [Virtual Try-On]
      operationId: getVirtualTryOnSession
      summary: Get a virtual try-on session
      description: |
        Requires either a bearer token for an authenticated user or `X-Install-Id` for a guest installation.
        Only the owner of the session can access it.
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Install-Id
          required: false
          schema:
            type: string
          description: Guest installation identifier used when no bearer token is provided.
      responses:
        '200':
          description: Virtual try-on session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualTryOnSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/virtual-try-on/sessions/{sessionId}/sync:
    post:
      tags: [Virtual Try-On]
      operationId: syncVirtualTryOnSession
      summary: Force sync of a pending virtual try-on session with FASHN status API
      description: |
        Requires either a bearer token for an authenticated user or `X-Install-Id` for a guest installation.
        If the session is still pending, the backend fetches the latest state from FASHN and pushes any update to websocket subscribers.
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Install-Id
          required: false
          schema:
            type: string
          description: Guest installation identifier used when no bearer token is provided.
      responses:
        '200':
          description: Synchronized virtual try-on session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualTryOnSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/virtual-try-on/webhooks/fashn:
    post:
      tags: [Virtual Try-On]
      operationId: handleFashnVirtualTryOnWebhook
      summary: Receive FASHN webhook updates for virtual try-on sessions
      parameters:
        - in: query
          name: token
          required: false
          schema:
            type: string
          description: Shared webhook secret appended to the configured FASHN `webhook_url`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FashnWebhookRequest'
      responses:
        '204':
          description: Webhook accepted
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/email/start:
    post:
      tags: [Auth]
      operationId: startEmailAuth
      summary: Start email authentication challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartEmailAuthRequest'
      responses:
        '200':
          description: Email auth challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/email/confirm:
    post:
      tags: [Auth]
      operationId: confirmEmailAuthCode
      summary: Confirm email auth challenge with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmEmailCodeRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/telegram/complete:
    post:
      tags: [Auth]
      operationId: completeTelegramAuth
      summary: Complete Telegram authentication
      # TODO: authPayload format is provider-specific; code does not define a stable external schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramCompleteAuthRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/max/complete:
    post:
      tags: [Auth]
      operationId: completeMaxAuth
      summary: Complete MAX authentication
      # TODO: authPayload format is provider-specific; code does not define a stable external schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaxCompleteAuthRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAuthSession
      summary: Refresh access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logoutCurrentSession
      summary: Revoke one refresh session for current user
      # TODO: SecurityConfig permits /api/v1/auth/**, but controller requires @AuthenticationPrincipal.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Session revoked or no matching session
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      operationId: logoutAllSessions
      summary: Revoke all sessions for current user
      # TODO: SecurityConfig permits /api/v1/auth/**, but controller requires @AuthenticationPrincipal.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: All user sessions revoked
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/login:
    post:
      tags: [Admin Auth]
      operationId: loginAdmin
      summary: Login as admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Admin session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/refresh:
    post:
      tags: [Admin Auth]
      operationId: refreshAdminSession
      summary: Refresh admin access and refresh tokens
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRefreshTokenRequest'
      responses:
        '200':
          description: New admin session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/logout:
    post:
      tags: [Admin Auth]
      operationId: logoutAdminSession
      summary: Revoke one admin refresh session
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLogoutRequest'
      responses:
        '204':
          description: Session revoked or no matching session
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart:
    get:
      tags: [Cart]
      operationId: getCart
      summary: Get or create active cart for current actor
      security:
        - bearerAuth: []
        - installIdHeader: []
      responses:
        '200':
          description: Active cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Cart]
      operationId: clearCart
      summary: Remove all items from active cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      responses:
        '200':
          description: Cleared cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart/items:
    post:
      tags: [Cart]
      operationId: addCartItem
      summary: Add product (or product variant) to active cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [Cart]
      operationId: changeCartItemQuantity
      summary: Change quantity of a cart item
      security:
        - bearerAuth: []
        - installIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeCartItemQuantityRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart/items/{productId}:
    delete:
      tags: [Cart]
      operationId: removeCartItem
      summary: Remove product (or specific product variant) from active cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      parameters:
        - $ref: '#/components/parameters/ProductIdPathParam'
        - name: variantId
          in: query
          required: false
          description: Variant id to remove. When omitted, removes all cart items for the product.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/catalog/categories:
    get:
      tags: [Catalog]
      operationId: getCategories
      summary: List catalog categories
      description: Returns categories sorted by name ascending.
      parameters:
        - name: activeOnly
          in: query
          required: false
          description: When true (default), returns only active categories.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/catalog/products:
    get:
      tags: [Catalog]
      operationId: getProducts
      summary: List catalog products
      description: |
        Returns active products sorted by `createdAt` descending.
        Supports filters by `categoryId` and case-insensitive title `query`.
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: query
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/catalog/products/{productId}:
    get:
      tags: [Catalog]
      operationId: getProductById
      summary: Get one active product by id
      parameters:
        - $ref: '#/components/parameters/ProductIdPathParam'
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailsResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog/categories:
    get:
      tags: [Catalog Admin]
      operationId: getAdminCategories
      summary: List categories by activity flag
      security:
        - bearerAuth: []
      parameters:
        - name: isActive
          in: query
          required: true
          description: Returns only categories with the provided activity status.
          schema:
            type: boolean
      responses:
        '200':
          description: Filtered category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Catalog Admin]
      operationId: upsertCategory
      summary: Create or update category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertCategoryRequest'
      responses:
        '200':
          description: Saved category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog/products:
    get:
      tags: [Catalog Admin]
      operationId: getAdminProducts
      summary: List products by activity flag
      security:
        - bearerAuth: []
      parameters:
        - name: isActive
          in: query
          required: true
          description: Returns only products with the provided activity status.
          schema:
            type: boolean
      responses:
        '200':
          description: Filtered product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Catalog Admin]
      operationId: upsertProduct
      summary: Create or update product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProductRequest'
      responses:
        '200':
          description: Saved product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/products/{productId}:
    get:
      tags: [Catalog Admin]
      operationId: getAdminProductById
      summary: Get one product by id (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIdPathParam'
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailsResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog-import:
    post:
      tags: [Catalog Admin]
      operationId: importCatalog
      summary: Import catalog entities from CSV
      description: |
        Accepts CSV file as `multipart/form-data` and processes import in one of the supported modes.
        Alias route is also available at `/api/admin/catalog-import`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CatalogImportMultipartRequest'
      responses:
        '200':
          description: Import report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogImportResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog-import/examples:
    get:
      tags: [Catalog Admin]
      operationId: listCatalogImportExamples
      summary: List available CSV import examples
      description: Alias route is also available at `/api/admin/catalog-import/examples`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Available example files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogImportExampleResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog-import/examples/{importType}/{importMode}:
    get:
      tags: [Catalog Admin]
      operationId: downloadCatalogImportExample
      summary: Download CSV import example by type and mode
      description: Alias route is also available at `/api/admin/catalog-import/examples/{importType}/{importMode}`.
      security:
        - bearerAuth: []
      parameters:
        - name: importType
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/CatalogImportType'
        - name: importMode
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/CatalogImportMode'
      responses:
        '200':
          description: CSV file content
          headers:
            Content-Disposition:
              description: Suggested attachment filename.
              schema:
                type: string
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/checkout:
    post:
      tags: [Orders]
      operationId: checkout
      summary: Checkout current actor cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Created order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/guest/checkout:
    post:
      tags: [Orders]
      operationId: guestCheckout
      summary: Create guest order from provided items
      parameters:
        - name: X-Install-Id
          in: header
          required: false
          description: Optional guest installation id saved into order (`guestInstallId`).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestCheckoutRequest'
      responses:
        '200':
          description: Created guest order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrderById
      summary: Get one order visible to current actor
      security:
        - bearerAuth: []
        - installIdHeader: []
      parameters:
        - $ref: '#/components/parameters/OrderIdPathParam'
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/my:
    get:
      tags: [Orders]
      operationId: getMyOrders
      summary: List orders of current actor
      description: Returns orders sorted by `createdAt` descending.
      security:
        - bearerAuth: []
        - installIdHeader: []
      responses:
        '200':
          description: Actor orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/orders:
    get:
      tags: [Orders Admin]
      operationId: getAdminOrders
      summary: List admin queue orders
      description: Returns orders with statuses `PENDING` and `CONFIRMED`, sorted by `createdAt` descending.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders in admin queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/orders/search:
    get:
      tags: [Orders Admin]
      operationId: getAdminOrderByNumber
      summary: Find order by number
      description: Returns one order by exact `orderNumber` match.
      security:
        - bearerAuth: []
      parameters:
        - name: orderNumber
          in: query
          required: true
          description: Order number from `OrderResponse.orderNumber`.
          schema:
            type: string
            minLength: 1
            example: ORD-1741610765123-4FA8B2
      responses:
        '200':
          description: Order found by number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/orders/{orderId}/status:
    patch:
      tags: [Orders Admin]
      operationId: updateOrderStatus
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Updated order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/telegram/test-message:
    post:
      tags: [Notifications Admin]
      operationId: sendTelegramTestMessage
      summary: Send Telegram test message to configured recipients
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTelegramTestMessageRequest'
      responses:
        '200':
          description: Test message delivery report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendTelegramTestMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/media/uploads:
    post:
      tags: [Media Admin]
      operationId: createMediaUploadSession
      summary: Create direct upload session for media image
      description: |
        Returns pre-signed upload URL and required headers.
        Actual binary upload happens directly to object storage URL, not via this backend.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadSessionRequest'
      responses:
        '200':
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUploadSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/media/uploads/{uploadId}/complete:
    post:
      tags: [Media Admin]
      operationId: completeMediaUpload
      summary: Complete upload session and bind image to target entity
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UploadIdPathParam'
      responses:
        '200':
          description: Media image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaImageResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token in `Authorization: Bearer <token>`"
    installIdHeader:
      type: apiKey
      in: header
      name: X-Install-Id
      description: Guest actor identifier used by `CurrentActorArgumentResolver`

  parameters:
    ProductIdPathParam:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderIdPathParam:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UploadIdPathParam:
      name: uploadId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequestError:
      description: Request validation failed or business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnauthorizedError:
      description: Authentication required or invalid token/header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ForbiddenError:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, INTERNAL_ERROR]
        message:
          type: string
        traceId:
          type: string
          nullable: true
          description: Request trace id (`X-Trace-Id`) when available.
        details:
          type: object
          nullable: true
          additionalProperties: true
          # TODO: concrete map shape varies by exception type; only stable contract is object map.

    AvailableAuthMethodsResponse:
      type: object
      required: [methods]
      properties:
        methods:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/AuthMethod'

    AuthChallengeResponse:
      type: object
      required: [challengeId, method, expiresAt, nextStep]
      properties:
        challengeId:
          type: string
          format: uuid
        method:
          $ref: '#/components/schemas/AuthMethod'
        expiresAt:
          type: string
          format: date-time
        resendAvailableAt:
          type: string
          format: date-time
          nullable: true
        nextStep:
          type: string
          description: Current implementation returns `CONFIRM_CODE`.

    AuthTokensResponse:
      type: object
      required:
        [
          accessToken,
          accessTokenExpiresAt,
          refreshToken,
          refreshTokenExpiresAt,
          isNewUser,
          userId,
        ]
      properties:
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
        isNewUser:
          type: boolean
        userId:
          type: string
          format: uuid

    AdminLoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    AdminRefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    AdminLogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true

    AdminAuthTokensResponse:
      type: object
      required:
        [
          accessToken,
          accessTokenExpiresAt,
          refreshToken,
          refreshTokenExpiresAt,
          adminId,
        ]
      properties:
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
        adminId:
          type: string
          format: uuid

    StartPhoneAuthRequest:
      type: object
      required: [phone, method]
      properties:
        phone:
          type: string
        method:
          $ref: '#/components/schemas/AuthMethodStartPhone'
      # TODO: `@NotBlank` exists on phone but controller lacks `@Valid`; strict blank-string validation may not run.

    ConfirmPhoneCodeRequest:
      type: object
      required: [challengeId, code]
      properties:
        challengeId:
          type: string
          format: uuid
        code:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    StartEmailAuthRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          minLength: 1

    ConfirmEmailCodeRequest:
      type: object
      required: [challengeId, code]
      properties:
        challengeId:
          type: string
          format: uuid
        code:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    TelegramCompleteAuthRequest:
      type: object
      required: [authPayload]
      properties:
        authPayload:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    MaxCompleteAuthRequest:
      type: object
      required: [authPayload]
      properties:
        authPayload:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true

    AddCartItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
          nullable: true
        quantity:
          type: integer
          format: int32
          minimum: 1

    ChangeCartItemQuantityRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
          nullable: true
        quantity:
          type: integer
          format: int32
          minimum: 1

    CartResponse:
      type: object
      required: [id, status, items, totalPriceMinor]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CartStatus'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemResponse'
        totalPriceMinor:
          type: integer
          format: int64

    CartItemResponse:
      type: object
      required:
        [productId, title, unit, countStep, quantity, priceMinor, lineTotalMinor]
      properties:
        productId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        unit:
          $ref: '#/components/schemas/ProductUnit'
        countStep:
          type: integer
          format: int32
        quantity:
          type: integer
          format: int32
        priceMinor:
          type: integer
          format: int64
        lineTotalMinor:
          type: integer
          format: int64

    CategoryResponse:
      type: object
      required: [id, name, slug, isActive]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        imageUrl:
          type: string
          nullable: true
        isActive:
          type: boolean

    ProductResponse:
      type: object
      required: [id, categoryId, title, slug, priceMinor, unit, countStep, isActive]
      properties:
        id:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        brand:
          type: string
          nullable: true
        priceMinor:
          type: integer
          format: int64
        oldPriceMinor:
          type: integer
          format: int64
          nullable: true
        sku:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        unit:
          $ref: '#/components/schemas/ProductUnit'
        countStep:
          type: integer
          format: int32
        isActive:
          type: boolean

    ProductDetailsResponse:
      type: object
      required:
        [
          id,
          categoryId,
          title,
          slug,
          priceMinor,
          unit,
          countStep,
          isActive,
          optionGroups,
          variants,
        ]
      properties:
        id:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        priceMinor:
          type: integer
          format: int64
        oldPriceMinor:
          type: integer
          format: int64
          nullable: true
        sku:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        unit:
          $ref: '#/components/schemas/ProductUnit'
        countStep:
          type: integer
          format: int32
        isActive:
          type: boolean
        optionGroups:
          type: array
          items:
            $ref: '#/components/schemas/ProductOptionGroupResponse'
        defaultVariantId:
          type: string
          format: uuid
          nullable: true
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariantResponse'

    ProductOptionGroupResponse:
      type: object
      required: [id, code, title, sortOrder, values]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        sortOrder:
          type: integer
          format: int32
        values:
          type: array
          items:
            $ref: '#/components/schemas/ProductOptionValueResponse'

    ProductOptionValueResponse:
      type: object
      required: [id, code, title, sortOrder]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        sortOrder:
          type: integer
          format: int32

    ProductVariantResponse:
      type: object
      required: [id, sku, sortOrder, isActive, optionValueIds]
      properties:
        id:
          type: string
          format: uuid
        externalId:
          type: string
          nullable: true
        sku:
          type: string
        title:
          type: string
          nullable: true
        priceMinor:
          type: integer
          format: int64
          nullable: true
        oldPriceMinor:
          type: integer
          format: int64
          nullable: true
        imageUrl:
          type: string
          nullable: true
        sortOrder:
          type: integer
          format: int32
        isActive:
          type: boolean
        optionValueIds:
          type: array
          items:
            type: string
            format: uuid

    UpsertCategoryRequest:
      type: object
      required: [name]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          minLength: 1
        slug:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true

    UpsertProductRequest:
      type: object
      required: [categoryId, title, priceMinor, unit, countStep]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        categoryId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        slug:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        priceMinor:
          type: integer
          format: int64
          minimum: 0
        oldPriceMinor:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        sku:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        unit:
          $ref: '#/components/schemas/ProductUnit'
        countStep:
          type: integer
          format: int32
          minimum: 1
        isActive:
          type: boolean
          default: true
        optionGroups:
          type: array
          items:
            $ref: '#/components/schemas/UpsertProductOptionGroupRequest'
        variants:
          type: array
          items:
            $ref: '#/components/schemas/UpsertProductVariantRequest'

    UpsertProductOptionGroupRequest:
      type: object
      required: [code, title]
      properties:
        code:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        sortOrder:
          type: integer
          format: int32
          default: 0
        values:
          type: array
          items:
            $ref: '#/components/schemas/UpsertProductOptionValueRequest'

    UpsertProductOptionValueRequest:
      type: object
      required: [code, title]
      properties:
        code:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        sortOrder:
          type: integer
          format: int32
          default: 0

    UpsertProductVariantRequest:
      type: object
      required: [sku]
      properties:
        externalId:
          type: string
          nullable: true
        sku:
          type: string
          minLength: 1
        title:
          type: string
          nullable: true
        priceMinor:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        oldPriceMinor:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        imageUrl:
          type: string
          nullable: true
        sortOrder:
          type: integer
          format: int32
          default: 0
        isActive:
          type: boolean
          default: true
        options:
          type: array
          items:
            $ref: '#/components/schemas/UpsertProductVariantOptionRequest'

    UpsertProductVariantOptionRequest:
      type: object
      required: [optionGroupCode, optionValueCode]
      properties:
        optionGroupCode:
          type: string
          minLength: 1
        optionValueCode:
          type: string
          minLength: 1

    CatalogImportMultipartRequest:
      type: object
      required: [file, importType, importMode]
      properties:
        file:
          type: string
          format: binary
          description: CSV file encoded in UTF-8 with comma delimiter.
        importType:
          $ref: '#/components/schemas/CatalogImportType'
        importMode:
          $ref: '#/components/schemas/CatalogImportMode'

    CatalogImportResponse:
      type: object
      required:
        [
          importType,
          importMode,
          totalRows,
          successCount,
          createdCount,
          updatedCount,
          skippedCount,
          errorCount,
          rowErrors,
        ]
      properties:
        importType:
          $ref: '#/components/schemas/CatalogImportType'
        importMode:
          $ref: '#/components/schemas/CatalogImportMode'
        totalRows:
          type: integer
          format: int32
        successCount:
          type: integer
          format: int32
        createdCount:
          type: integer
          format: int32
        updatedCount:
          type: integer
          format: int32
        skippedCount:
          type: integer
          format: int32
        errorCount:
          type: integer
          format: int32
        rowErrors:
          type: array
          items:
            $ref: '#/components/schemas/CatalogImportRowErrorResponse'

    CatalogImportRowErrorResponse:
      type: object
      required: [rowNumber, errorCode, message]
      properties:
        rowNumber:
          type: integer
          format: int32
        rowKey:
          type: string
          nullable: true
        errorCode:
          $ref: '#/components/schemas/CatalogImportErrorCode'
        message:
          type: string

    CatalogImportExampleResponse:
      type: object
      required: [importType, importMode, fileName, downloadUrl]
      properties:
        importType:
