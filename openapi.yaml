openapi: 3.0.3
info:
  title: Delivery Service API
  version: 1.0.0
  description: |
    OpenAPI specification generated from existing Spring Boot controllers and DTOs.
    Includes only routes found in code under `src/main/kotlin`.
tags:
  - name: Auth
    description: Authentication and session management
  - name: Admin Auth
    description: Admin authentication and session management
  - name: Cart
    description: Shopping cart operations
  - name: Catalog
    description: Public product and category catalog
  - name: Catalog Admin
    description: Admin catalog management
  - name: Orders
    description: Order placement and retrieval
  - name: Orders Admin
    description: Admin order operations
  - name: Media Admin
    description: Admin media upload session operations
paths:
  /api/v1/auth/methods:
    get:
      tags: [Auth]
      operationId: getAvailableAuthMethods
      summary: List available authentication methods
      responses:
        '200':
          description: Available authentication methods
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableAuthMethodsResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/phone/start:
    post:
      tags: [Auth]
      operationId: startPhoneAuth
      summary: Start phone authentication challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartPhoneAuthRequest'
      responses:
        '200':
          description: Phone auth challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/phone/confirm:
    post:
      tags: [Auth]
      operationId: confirmPhoneAuthCode
      summary: Confirm phone auth challenge with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPhoneCodeRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/email/start:
    post:
      tags: [Auth]
      operationId: startEmailAuth
      summary: Start email authentication challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartEmailAuthRequest'
      responses:
        '200':
          description: Email auth challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/email/confirm:
    post:
      tags: [Auth]
      operationId: confirmEmailAuthCode
      summary: Confirm email auth challenge with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmEmailCodeRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/telegram/complete:
    post:
      tags: [Auth]
      operationId: completeTelegramAuth
      summary: Complete Telegram authentication
      # TODO: authPayload format is provider-specific; code does not define a stable external schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramCompleteAuthRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/max/complete:
    post:
      tags: [Auth]
      operationId: completeMaxAuth
      summary: Complete MAX authentication
      # TODO: authPayload format is provider-specific; code does not define a stable external schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaxCompleteAuthRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAuthSession
      summary: Refresh access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logoutCurrentSession
      summary: Revoke one refresh session for current user
      # TODO: SecurityConfig permits /api/v1/auth/**, but controller requires @AuthenticationPrincipal.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Session revoked or no matching session
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      operationId: logoutAllSessions
      summary: Revoke all sessions for current user
      # TODO: SecurityConfig permits /api/v1/auth/**, but controller requires @AuthenticationPrincipal.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: All user sessions revoked
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/login:
    post:
      tags: [Admin Auth]
      operationId: loginAdmin
      summary: Login as admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Admin session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/refresh:
    post:
      tags: [Admin Auth]
      operationId: refreshAdminSession
      summary: Refresh admin access and refresh tokens
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRefreshTokenRequest'
      responses:
        '200':
          description: New admin session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/logout:
    post:
      tags: [Admin Auth]
      operationId: logoutAdminSession
      summary: Revoke one admin refresh session
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLogoutRequest'
      responses:
        '204':
          description: Session revoked or no matching session
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart:
    get:
      tags: [Cart]
      operationId: getCart
      summary: Get or create active cart for current actor
      security:
        - bearerAuth: []
        - installIdHeader: []
      responses:
        '200':
          description: Active cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Cart]
      operationId: clearCart
      summary: Remove all items from active cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      responses:
        '200':
          description: Cleared cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart/items:
    post:
      tags: [Cart]
      operationId: addCartItem
      summary: Add product to active cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [Cart]
      operationId: changeCartItemQuantity
      summary: Change quantity of a cart item
      security:
        - bearerAuth: []
        - installIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeCartItemQuantityRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart/items/{productId}:
    delete:
      tags: [Cart]
      operationId: removeCartItem
      summary: Remove product from active cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      parameters:
        - $ref: '#/components/parameters/ProductIdPathParam'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/catalog/categories:
    get:
      tags: [Catalog]
      operationId: getCategories
      summary: List catalog categories
      description: Returns categories sorted by name ascending.
      parameters:
        - name: activeOnly
          in: query
          required: false
          description: When true (default), returns only active categories.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/catalog/products:
    get:
      tags: [Catalog]
      operationId: getProducts
      summary: List catalog products
      description: |
        Returns active products sorted by `createdAt` descending.
        Supports filters by `categoryId` and case-insensitive title `query`.
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: query
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/catalog/products/{productId}:
    get:
      tags: [Catalog]
      operationId: getProductById
      summary: Get one active product by id
      parameters:
        - $ref: '#/components/parameters/ProductIdPathParam'
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog/categories:
    post:
      tags: [Catalog Admin]
      operationId: upsertCategory
      summary: Create or update category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertCategoryRequest'
      responses:
        '200':
          description: Saved category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog/products:
    post:
      tags: [Catalog Admin]
      operationId: upsertProduct
      summary: Create or update product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProductRequest'
      responses:
        '200':
          description: Saved product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/checkout:
    post:
      tags: [Orders]
      operationId: checkout
      summary: Checkout current actor cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Created order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/guest/checkout:
    post:
      tags: [Orders]
      operationId: guestCheckout
      summary: Create guest order from provided items
      parameters:
        - name: X-Install-Id
          in: header
          required: false
          description: Optional guest installation id saved into order (`guestInstallId`).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestCheckoutRequest'
      responses:
        '200':
          description: Created guest order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrderById
      summary: Get one order visible to current actor
      security:
        - bearerAuth: []
        - installIdHeader: []
      parameters:
        - $ref: '#/components/parameters/OrderIdPathParam'
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/my:
    get:
      tags: [Orders]
      operationId: getMyOrders
      summary: List orders of current actor
      description: Returns orders sorted by `createdAt` descending.
      security:
        - bearerAuth: []
        - installIdHeader: []
      responses:
        '200':
          description: Actor orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/orders:
    get:
      tags: [Orders Admin]
      operationId: getAdminOrders
      summary: List admin queue orders
      description: Returns orders with statuses `PENDING` and `CONFIRMED`, sorted by `createdAt` descending.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders in admin queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/orders/search:
    get:
      tags: [Orders Admin]
      operationId: getAdminOrderByNumber
      summary: Find order by number
      description: Returns one order by exact `orderNumber` match.
      security:
        - bearerAuth: []
      parameters:
        - name: orderNumber
          in: query
          required: true
          description: Order number from `OrderResponse.orderNumber`.
          schema:
            type: string
            minLength: 1
            example: ORD-1741610765123-4FA8B2
      responses:
        '200':
          description: Order found by number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/orders/{orderId}/status:
    patch:
      tags: [Orders Admin]
      operationId: updateOrderStatus
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Updated order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/media/uploads:
    post:
      tags: [Media Admin]
      operationId: createMediaUploadSession
      summary: Create direct upload session for media image
      description: |
        Returns pre-signed upload URL and required headers.
        Actual binary upload happens directly to object storage URL, not via this backend.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadSessionRequest'
      responses:
        '200':
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUploadSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/media/uploads/{uploadId}/complete:
    post:
      tags: [Media Admin]
      operationId: completeMediaUpload
      summary: Complete upload session and bind image to target entity
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UploadIdPathParam'
      responses:
        '200':
          description: Media image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaImageResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token in `Authorization: Bearer <token>`"
    installIdHeader:
      type: apiKey
      in: header
      name: X-Install-Id
      description: Guest actor identifier used by `CurrentActorArgumentResolver`

  parameters:
    ProductIdPathParam:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderIdPathParam:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UploadIdPathParam:
      name: uploadId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequestError:
      description: Request validation failed or business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnauthorizedError:
      description: Authentication required or invalid token/header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ForbiddenError:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, INTERNAL_ERROR]
        message:
          type: string
        traceId:
          type: string
          nullable: true
          description: Request trace id (`X-Trace-Id`) when available.
        details:
          type: object
          nullable: true
          additionalProperties: true
