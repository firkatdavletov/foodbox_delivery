openapi: 3.0.3
info:
  title: Delivery Service API
  version: 1.0.0
  description: |
    OpenAPI specification generated from existing Spring Boot controllers and DTOs.
    Includes only routes found in code under `src/main/kotlin`.
tags:
  - name: Auth
    description: Authentication and session management
  - name: Admin Auth
    description: Admin authentication and session management
  - name: Cart
    description: Shopping cart operations
  - name: Delivery
    description: Delivery methods, quotes, and Yandex pickup point discovery
  - name: Checkout
    description: Checkout option discovery for delivery and payment combinations
  - name: Catalog
    description: Public product and category catalog
  - name: Catalog Admin
    description: Admin catalog management
  - name: Delivery Admin
    description: Admin delivery and pickup configuration
  - name: Payments
    description: Payment methods and payment operations
  - name: Orders
    description: Order placement and retrieval
  - name: Orders Admin
    description: Admin order operations
  - name: Notifications Admin
    description: Admin notification operations
  - name: Media Admin
    description: Admin media upload session operations
  - name: Virtual Try-On
    description: |
      Client virtual try-on sessions, FASHN webhook integration, and websocket update flow.
      Websocket handshake endpoint: `/ws/virtual-try-on` (STOMP over SockJS).
      Subscription destination is returned per session in `websocketDestination`.
paths:
  /api/v1/auth/methods:
    get:
      tags: [Auth]
      operationId: getAvailableAuthMethods
      summary: List available authentication methods
      responses:
        '200':
          description: Available authentication methods
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableAuthMethodsResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/phone/start:
    post:
      tags: [Auth]
      operationId: startPhoneAuth
      summary: Start phone authentication challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartPhoneAuthRequest'
      responses:
        '200':
          description: Phone auth challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/phone/confirm:
    post:
      tags: [Auth]
      operationId: confirmPhoneAuthCode
      summary: Confirm phone auth challenge with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPhoneCodeRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/virtual-try-on/sessions:
    post:
      tags: [Virtual Try-On]
      operationId: createVirtualTryOnSession
      summary: Start a virtual try-on session
      description: |
        Requires either a bearer token for an authenticated user or `X-Install-Id` for a guest installation.
        The backend resolves the garment image from the active product or variant and submits the request to FASHN.
        The response includes websocket connection details for real-time status updates.
      parameters:
        - in: header
          name: X-Install-Id
          required: false
          schema:
            type: string
          description: Guest installation identifier used when no bearer token is provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVirtualTryOnSessionRequest'
      responses:
        '200':
          description: Virtual try-on session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualTryOnSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/virtual-try-on/sessions/{sessionId}:
    get:
      tags: [Virtual Try-On]
      operationId: getVirtualTryOnSession
      summary: Get a virtual try-on session
      description: |
        Requires either a bearer token for an authenticated user or `X-Install-Id` for a guest installation.
        Only the owner of the session can access it.
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Install-Id
          required: false
          schema:
            type: string
          description: Guest installation identifier used when no bearer token is provided.
      responses:
        '200':
          description: Virtual try-on session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualTryOnSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/virtual-try-on/sessions/{sessionId}/sync:
    post:
      tags: [Virtual Try-On]
      operationId: syncVirtualTryOnSession
      summary: Force sync of a pending virtual try-on session with FASHN status API
      description: |
        Requires either a bearer token for an authenticated user or `X-Install-Id` for a guest installation.
        If the session is still pending, the backend fetches the latest state from FASHN and pushes any update to websocket subscribers.
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Install-Id
          required: false
          schema:
            type: string
          description: Guest installation identifier used when no bearer token is provided.
      responses:
        '200':
          description: Synchronized virtual try-on session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualTryOnSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/virtual-try-on/webhooks/fashn:
    post:
      tags: [Virtual Try-On]
      operationId: handleFashnVirtualTryOnWebhook
      summary: Receive FASHN webhook updates for virtual try-on sessions
      parameters:
        - in: query
          name: token
          required: false
          schema:
            type: string
          description: Shared webhook secret appended to the configured FASHN `webhook_url`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FashnWebhookRequest'
      responses:
        '204':
          description: Webhook accepted
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/email/start:
    post:
      tags: [Auth]
      operationId: startEmailAuth
      summary: Start email authentication challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartEmailAuthRequest'
      responses:
        '200':
          description: Email auth challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/email/confirm:
    post:
      tags: [Auth]
      operationId: confirmEmailAuthCode
      summary: Confirm email auth challenge with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmEmailCodeRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/telegram/complete:
    post:
      tags: [Auth]
      operationId: completeTelegramAuth
      summary: Complete Telegram authentication
      # TODO: authPayload format is provider-specific; code does not define a stable external schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramCompleteAuthRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/max/complete:
    post:
      tags: [Auth]
      operationId: completeMaxAuth
      summary: Complete MAX authentication
      # TODO: authPayload format is provider-specific; code does not define a stable external schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaxCompleteAuthRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAuthSession
      summary: Refresh access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logoutCurrentSession
      summary: Revoke one refresh session for current user
      # TODO: SecurityConfig permits /api/v1/auth/**, but controller requires @AuthenticationPrincipal.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Session revoked or no matching session
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      operationId: logoutAllSessions
      summary: Revoke all sessions for current user
      # TODO: SecurityConfig permits /api/v1/auth/**, but controller requires @AuthenticationPrincipal.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: All user sessions revoked
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/login:
    post:
      tags: [Admin Auth]
      operationId: loginAdmin
      summary: Login as admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Admin session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/refresh:
    post:
      tags: [Admin Auth]
      operationId: refreshAdminSession
      summary: Refresh admin access and refresh tokens
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRefreshTokenRequest'
      responses:
        '200':
          description: New admin session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/logout:
    post:
      tags: [Admin Auth]
      operationId: logoutAdminSession
      summary: Revoke one admin refresh session
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLogoutRequest'
      responses:
        '204':
          description: Session revoked or no matching session
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart:
    get:
      tags: [Cart]
      operationId: getCart
      summary: Get or create active cart for current actor
      security:
        - bearerAuth: []
        - installIdHeader: []
      responses:
        '200':
          description: Active cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Cart]
      operationId: clearCart
      summary: Remove all items from active cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      responses:
        '200':
          description: Cleared cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart/delivery:
    get:
      tags: [Cart]
      operationId: getCartDeliveryDraft
      summary: Get current cart delivery draft
      security:
        - bearerAuth: []
        - installIdHeader: []
      responses:
        '200':
          description: Current cart delivery draft or `null` when not selected
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CartDeliveryDraftResponse'
                nullable: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [Cart]
      operationId: putCartDeliveryDraft
      summary: Create or replace current cart delivery draft
      security:
        - bearerAuth: []
        - installIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutCartDeliveryRequest'
      responses:
        '200':
          description: Updated cart delivery draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartDeliveryDraftResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart/items:
    post:
      tags: [Cart]
      operationId: addCartItem
      summary: Add product (or product variant) with optional modifiers to active cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/cart/items/{itemId}:
    patch:
      tags: [Cart]
      operationId: changeCartItemQuantity
      summary: Change quantity of a cart item
      security:
        - bearerAuth: []
        - installIdHeader: []
      parameters:
        - $ref: '#/components/parameters/CartItemIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeCartItemQuantityRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Cart]
      operationId: removeCartItem
      summary: Remove one configured cart item from active cart
      security:
        - bearerAuth: []
        - installIdHeader: []
      parameters:
        - $ref: '#/components/parameters/CartItemIdPathParam'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/catalog/categories:
    get:
      tags: [Catalog]
      operationId: getCategories
      summary: List catalog categories
      description: Returns categories sorted by name ascending.
      parameters:
        - name: activeOnly
          in: query
          required: false
          description: When true (default), returns only active categories.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/catalog/products:
    get:
      tags: [Catalog]
      operationId: getProducts
      summary: List catalog products
      description: |
        Returns active products sorted by `createdAt` descending.
        Supports filters by `categoryId` and case-insensitive title `query`.
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: query
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/catalog/products/{productId}:
    get:
      tags: [Catalog]
      operationId: getProductById
      summary: Get one active product by id
      parameters:
        - $ref: '#/components/parameters/ProductIdPathParam'
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailsResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog/categories:
    get:
      tags: [Catalog Admin]
      operationId: getAdminCategories
      summary: List categories by activity flag
      security:
        - bearerAuth: []
      parameters:
        - name: isActive
          in: query
          required: true
          description: Returns only categories with the provided activity status.
          schema:
            type: boolean
      responses:
        '200':
          description: Filtered category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Catalog Admin]
      operationId: upsertCategory
      summary: Create or update category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertCategoryRequest'
      responses:
        '200':
          description: Saved category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog/products:
    get:
      tags: [Catalog Admin]
      operationId: getAdminProducts
      summary: List products by activity flag
      security:
        - bearerAuth: []
      parameters:
        - name: isActive
          in: query
          required: true
          description: Returns only products with the provided activity status.
          schema:
            type: boolean
      responses:
        '200':
          description: Filtered product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Catalog Admin]
      operationId: upsertProduct
      summary: Create or update product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProductRequest'
      responses:
        '200':
          description: Saved product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/catalog/modifier-groups:
    get:
      tags: [Catalog Admin]
      operationId: getAdminModifierGroups
      summary: List modifier groups
      security:
        - bearerAuth: []
      parameters:
        - name: isActive
          in: query
          required: false
          description: When provided, filters modifier groups by activity flag.
          schema:
            type: boolean
      responses:
        '200':
          description: Modifier groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModifierGroupResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Catalog Admin]
      operationId: upsertModifierGroup
      summary: Create or update modifier group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertModifierGroupRequest'
      responses:
        '200':
          description: Saved modifier group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifierGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/products/{productId}:
    get:
