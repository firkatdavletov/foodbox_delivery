      properties:
        name:
          type: string
          nullable: true
        message:
          type: string
          nullable: true

    VirtualTryOnCategory:
      type: string
      enum: [auto, tops, bottoms, one-pieces]

    VirtualTryOnGarmentPhotoType:
      type: string
      enum: [auto, flat-lay, model]

    VirtualTryOnMode:
      type: string
      enum: [performance, balanced, quality]

    VirtualTryOnModerationLevel:
