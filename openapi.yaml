          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/telegram/test-message:
    post:
      tags: [Notifications Admin]
      operationId: sendTelegramTestMessage
      summary: Send Telegram test message to configured recipients
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTelegramTestMessageRequest'
      responses:
        '200':
          description: Test message delivery report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendTelegramTestMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/media/uploads:
    post:
      tags: [Media Admin]
      operationId: createMediaUploadSession
      summary: Create direct upload session for media image
      description: |
        Returns pre-signed upload URL and required headers.
        Actual binary upload happens directly to object storage URL, not via this backend.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadSessionRequest'
      responses:
        '200':
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUploadSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/media/uploads/{uploadId}/complete:
    post:
      tags: [Media Admin]
      operationId: completeMediaUpload
      summary: Complete upload session and bind image to target entity
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UploadIdPathParam'
      responses:
        '200':
          description: Media image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaImageResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token in `Authorization: Bearer <token>`"
    installIdHeader:
      type: apiKey
      in: header
      name: X-Install-Id
      description: Guest actor identifier used by `CurrentActorArgumentResolver`

  parameters:
    ProductIdPathParam:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CartItemIdPathParam:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderIdPathParam:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UploadIdPathParam:
      name: uploadId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequestError:
      description: Request validation failed or business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnauthorizedError:
      description: Authentication required or invalid token/header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ForbiddenError:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ConflictError:
      description: Request conflicts with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, INTERNAL_ERROR]
        message:
          type: string
        traceId:
          type: string
          nullable: true
          description: Request trace id (`X-Trace-Id`) when available.
        details:
          type: object
          nullable: true
          additionalProperties: true
          # TODO: concrete map shape varies by exception type; only stable contract is object map.

    AvailableAuthMethodsResponse:
      type: object
      required: [methods]
      properties:
        methods:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/AuthMethod'

    AuthChallengeResponse:
      type: object
      required: [challengeId, method, expiresAt, nextStep]
      properties:
        challengeId:
          type: string
          format: uuid
        method:
          $ref: '#/components/schemas/AuthMethod'
        expiresAt:
          type: string
          format: date-time
        resendAvailableAt:
          type: string
          format: date-time
          nullable: true
        nextStep:
          type: string
          description: Current implementation returns `CONFIRM_CODE`.

    AuthTokensResponse:
      type: object
      required:
        [
          accessToken,
          accessTokenExpiresAt,
          refreshToken,
          refreshTokenExpiresAt,
          isNewUser,
          userId,
        ]
      properties:
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
        isNewUser:
          type: boolean
        userId:
          type: string
          format: uuid

    AdminLoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    AdminRefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    AdminLogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true

    AdminAuthTokensResponse:
      type: object
      required:
        [
          accessToken,
          accessTokenExpiresAt,
          refreshToken,
          refreshTokenExpiresAt,
          adminId,
        ]
      properties:
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
        adminId:
          type: string
          format: uuid

    StartPhoneAuthRequest:
      type: object
      required: [phone, method]
      properties:
        phone:
          type: string
        method:
          $ref: '#/components/schemas/AuthMethodStartPhone'
      # TODO: `@NotBlank` exists on phone but controller lacks `@Valid`; strict blank-string validation may not run.

    ConfirmPhoneCodeRequest:
      type: object
      required: [challengeId, code]
      properties:
        challengeId:
          type: string
          format: uuid
        code:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    StartEmailAuthRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          minLength: 1

    ConfirmEmailCodeRequest:
      type: object
      required: [challengeId, code]
      properties:
        challengeId:
          type: string
          format: uuid
        code:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    TelegramCompleteAuthRequest:
      type: object
      required: [authPayload]
      properties:
        authPayload:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    MaxCompleteAuthRequest:
      type: object
      required: [authPayload]
      properties:
        authPayload:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1
        deviceId:
          type: string
          nullable: true

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true

    CheckoutOptionsResponse:
      type: object
      required: [options]
      properties:
        options:
          type: array
          items:
            $ref: '#/components/schemas/CheckoutDeliveryOptionResponse'

    CheckoutDeliveryOptionResponse:
      type: object
      required: [code, name, requiresAddress, requiresPickupPoint, paymentMethods]
      properties:
        code:
          $ref: '#/components/schemas/DeliveryMethodType'
        name:
          type: string
        requiresAddress:
          type: boolean
        requiresPickupPoint:
          type: boolean
        paymentMethods:
          type: array
          items:
            $ref: '#/components/schemas/CheckoutPaymentMethodResponse'

    CheckoutPaymentMethodResponse:
      type: object
      required: [code, name, isOnline, isActive]
      properties:
        code:
          $ref: '#/components/schemas/PaymentMethodCode'
        name:
          type: string
        description:
          type: string
          nullable: true
        isOnline:
          type: boolean
        isActive:
          type: boolean

    PaymentMethodResponse:
      type: object
      required: [code, name, isOnline, isActive]
      properties:
        code:
          $ref: '#/components/schemas/PaymentMethodCode'
        name:
          type: string
        description:
          type: string
          nullable: true
        isOnline:
          type: boolean
        isActive:
          type: boolean

    CreatePaymentRequest:
      type: object
      required: [orderId, paymentMethodCode]
      properties:
        orderId:
          type: string
          format: uuid
        paymentMethodCode:
          $ref: '#/components/schemas/PaymentMethodCode'
        details:
          type: string
          nullable: true
          maxLength: 2000

    PaymentResponse:
      type: object
      required:
        [
          id,
          orderId,
          paymentMethodCode,
          paymentMethodName,
          status,
          amountMinor,
          currency,
          isOnline,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        paymentMethodCode:
          $ref: '#/components/schemas/PaymentMethodCode'
        paymentMethodName:
          type: string
        status:
          $ref: '#/components/schemas/PaymentStatus'
        amountMinor:
          type: integer
          format: int64
        currency:
          type: string
        isOnline:
          type: boolean
        providerCode:
          type: string
          nullable: true
        externalPaymentId:
          type: string
          nullable: true
        confirmationUrl:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true

    AddCartItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
          nullable: true
        quantity:
          type: integer
          format: int32
          minimum: 1
        modifiers:
          type: array
          items:
            $ref: '#/components/schemas/AddCartItemModifierRequest'

    AddCartItemModifierRequest:
      type: object
      required: [modifierGroupId, modifierOptionId]
      properties:
        modifierGroupId:
          type: string
          format: uuid
        modifierOptionId:
          type: string
          format: uuid
        quantity:
          type: integer
          format: int32
          minimum: 1
          default: 1

    ChangeCartItemQuantityRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          format: int32
          minimum: 1

    PutCartDeliveryRequest:
      type: object
      required: [deliveryMethod]
      properties:
        deliveryMethod:
          $ref: '#/components/schemas/DeliveryMethodType'
        address:
          allOf:
            - $ref: '#/components/schemas/DeliveryAddressRequest'
          nullable: true
        pickupPointId:
          type: string
          format: uuid
          nullable: true
        pickupPointExternalId:
          type: string
          nullable: true

    CartResponse:
      type: object
      required: [id, status, items, totalPriceMinor]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CartStatus'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemResponse'
        totalPriceMinor:
          type: integer
          format: int64
        delivery:
          allOf:
            - $ref: '#/components/schemas/CartDeliveryDraftResponse'
          nullable: true

    CartDeliveryDraftResponse:
      type: object
      required: [quoteExpired]
      properties:
        deliveryMethod:
          $ref: '#/components/schemas/DeliveryMethodType'
          nullable: true
        address:
          allOf:
            - $ref: '#/components/schemas/DeliveryAddressResponse'
          nullable: true
        pickupPointId:
          type: string
          format: uuid
          nullable: true
        pickupPointExternalId:
          type: string
          nullable: true
        pickupPointName:
          type: string
          nullable: true
        pickupPointAddress:
          type: string
          nullable: true
        quote:
          allOf:
            - $ref: '#/components/schemas/DeliveryQuoteResponse'
          nullable: true
        quoteExpired:
          type: boolean
        updatedAt:
          type: string
          format: date-time
          nullable: true

    CartItemResponse:
      type: object
      required:
        [id, productId, title, unit, countStep, quantity, priceMinor, unitPriceMinor, modifiersTotalMinor, lineTotalMinor, modifiers]
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        unit:
          $ref: '#/components/schemas/ProductUnit'
        countStep:
          type: integer
          format: int32
        quantity:
          type: integer
          format: int32
        priceMinor:
          type: integer
          format: int64
        unitPriceMinor:
          type: integer
          format: int64
        modifiersTotalMinor:
          type: integer
          format: int64
        lineTotalMinor:
          type: integer
          format: int64
        modifiers:
          type: array
          items:
            $ref: '#/components/schemas/CartItemModifierResponse'

    CartItemModifierResponse:
      type: object
      required: [modifierGroupId, modifierOptionId, groupCode, groupName, optionCode, optionName, applicationScope, priceMinor, quantity]
      properties:
        modifierGroupId:
          type: string
          format: uuid
        modifierOptionId:
          type: string
          format: uuid
        groupCode:
          type: string
        groupName:
          type: string
        optionCode:
          type: string
        optionName:
          type: string
        applicationScope:
          $ref: '#/components/schemas/ModifierApplicationScope'
        priceMinor:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32

    DeliveryMethodsResponse:
      type: object
      required: [methods, pickupPoints]
      properties:
        methods:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryMethodResponse'
        pickupPoints:
          type: array
          items:
            $ref: '#/components/schemas/PickupPointResponse'

    DeliveryMethodResponse:
      type: object
      required: [code, name, requiresAddress, requiresPickupPoint]
      properties:
        code:
          $ref: '#/components/schemas/DeliveryMethodType'
        name:
          type: string
        requiresAddress:
          type: boolean
        requiresPickupPoint:
          type: boolean

    PickupPointResponse:
      type: object
      required: [id, code, name, address, isActive]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        address:
          $ref: '#/components/schemas/DeliveryAddressResponse'
        isActive:
          type: boolean

    YandexLocationDetectRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1

    YandexLocationDetectResponse:
      type: object
      required: [variants]
      properties:
        variants:
          type: array
          items:
            $ref: '#/components/schemas/YandexLocationVariantResponse'

    YandexLocationVariantResponse:
      type: object
      required: [geoId, address]
      properties:
        geoId:
          type: integer
          format: int64
        address:
          type: string

    YandexPickupPointsRequest:
      type: object
      required: [geoId]
      properties:
        geoId:
          type: integer
          format: int64
          minimum: 0

    YandexPickupPointsResponse:
      type: object
      required: [points]
      properties:
        points:
          type: array
          items:
            $ref: '#/components/schemas/YandexPickupPointResponse'

    YandexPickupPointResponse:
      type: object
      required: [id, name, address, paymentMethods, isYandexBranded]
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        fullAddress:
          type: string
          nullable: true
        instruction:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        paymentMethods:
          type: array
          items:
            type: string
        isYandexBranded:
          type: boolean

    CalculateDeliveryQuoteRequest:
      type: object
      required: [subtotalMinor, itemCount, deliveryMethod]
      properties:
        subtotalMinor:
          type: integer
          format: int64
          minimum: 0
        itemCount:
          type: integer
          format: int32
          minimum: 1
        deliveryMethod:
          $ref: '#/components/schemas/DeliveryMethodType'
        address:
          allOf:
            - $ref: '#/components/schemas/DeliveryAddressRequest'
          nullable: true
        pickupPointId:
          type: string
          format: uuid
          nullable: true
        pickupPointExternalId:
          type: string
          nullable: true

    DeliveryQuoteResponse:
      type: object
      required: [deliveryMethod, available, currency]
      properties:
        deliveryMethod:
          $ref: '#/components/schemas/DeliveryMethodType'
        available:
          type: boolean
        priceMinor:
          type: integer
          format: int64
          nullable: true
        currency:
          type: string
        zoneCode:
          type: string
          nullable: true
        zoneName:
          type: string
          nullable: true
        estimatedDays:
          type: integer
          format: int32
          nullable: true
        message:
          type: string
          nullable: true
        pickupPointId:
          type: string
          format: uuid
          nullable: true
        pickupPointExternalId:
          type: string
          nullable: true
        pickupPointName:
          type: string
          nullable: true
        pickupPointAddress:
          type: string
          nullable: true

    DeliveryMethodSettingResponse:
      type: object
      required: [method, name, requiresAddress, requiresPickupPoint, isEnabled, sortOrder]
      properties:
        method:
          $ref: '#/components/schemas/DeliveryMethodType'
        name:
          type: string
        requiresAddress:
          type: boolean
        requiresPickupPoint:
          type: boolean
        isEnabled:
          type: boolean
        sortOrder:
          type: integer
          format: int32
          minimum: 0

    UpsertDeliveryMethodSettingRequest:
      type: object
      required: [method, isEnabled, sortOrder]
      properties:
        method:
          $ref: '#/components/schemas/DeliveryMethodType'
        isEnabled:
          type: boolean
        sortOrder:
          type: integer
          format: int32
          minimum: 0

    DeliveryZoneResponse:
      type: object
      required: [id, code, name, isActive]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        city:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        isActive:
          type: boolean

    UpsertDeliveryZoneRequest:
      type: object
      required: [code, name, isActive]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        code:
          type: string
          minLength: 1
          maxLength: 64
        name:
          type: string
          minLength: 1
          maxLength: 255
        city:
          type: string
          nullable: true
          maxLength: 255
        postalCode:
          type: string
          nullable: true
          maxLength: 64
        isActive:
          type: boolean

    DeliveryTariffResponse:
      type: object
      required: [id, method, isAvailable, fixedPriceMinor, currency]
      properties:
        id:
          type: string
          format: uuid
        method:
          $ref: '#/components/schemas/DeliveryMethodType'
        zoneId:
          type: string
          format: uuid
          nullable: true
        zoneCode:
          type: string
          nullable: true
        zoneName:
          type: string
          nullable: true
        isAvailable:
          type: boolean
        fixedPriceMinor:
          type: integer
          format: int64
          minimum: 0
        freeFromAmountMinor:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        currency:
          type: string
        estimatedDays:
          type: integer
          format: int32
          nullable: true
          minimum: 0

    UpsertDeliveryTariffRequest:
      type: object
      required: [method, isAvailable, fixedPriceMinor, currency]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        method:
          $ref: '#/components/schemas/DeliveryMethodType'
        zoneId:
          type: string
          format: uuid
          nullable: true
        isAvailable:
          type: boolean
        fixedPriceMinor:
          type: integer
          format: int64
          minimum: 0
        freeFromAmountMinor:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        estimatedDays:
          type: integer
          format: int32
          nullable: true
          minimum: 0

    AdminPickupPointResponse:
      type: object
      required: [id, code, name, address, isActive]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        address:
          $ref: '#/components/schemas/DeliveryAddressResponse'
        isActive:
          type: boolean

    UpsertPickupPointRequest:
      type: object
      required: [code, name, address, isActive]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        code:
          type: string
          minLength: 1
          maxLength: 64
        name:
          type: string
          minLength: 1
          maxLength: 255
        address:
          $ref: '#/components/schemas/DeliveryAddressRequest'
        isActive:
          type: boolean

    CheckoutPaymentRuleResponse:
      type: object
      required: [deliveryMethod, deliveryMethodName, paymentMethods, isDynamic]
      properties:
        deliveryMethod:
          $ref: '#/components/schemas/DeliveryMethodType'
        deliveryMethodName:
          type: string
        paymentMethods:
          type: array
          items:
            $ref: '#/components/schemas/PaymentMethodCode'
        isDynamic:
          type: boolean

    ReplaceCheckoutPaymentRulesRequest:
      type: object
      required: [rules]
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/UpsertCheckoutPaymentRuleRequest'

    UpsertCheckoutPaymentRuleRequest:
      type: object
      required: [deliveryMethod]
      properties:
        deliveryMethod:
          $ref: '#/components/schemas/DeliveryMethodType'
        paymentMethods:
          type: array
          items:
            $ref: '#/components/schemas/PaymentMethodCode'

    CategoryResponse:
      type: object
      required: [id, name, slug, imageUrls, isActive]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        imageUrls:
          type: array
          items:
